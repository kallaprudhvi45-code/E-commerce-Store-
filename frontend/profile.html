<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Shop | Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">CodeAlpha Shop</a>
            <button class="mobile-menu-btn">☰</button>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <main class="container" style="display: flex; justify-content: center; padding: 4rem 1.5rem;">
        <div class="card" style="width: 100%; max-width: 600px; padding: 2.5rem;">
            <h2 class="mb-8">My Profile</h2>
            <form id="profile-form">
                <div class="grid grid-cols-2" style="gap: 1rem;">
                    <div class="form-group mb-4">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" class="form-control" disabled>
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label">Phone</label>
                    <input type="tel" id="phone" class="form-control">
                </div>

                <div class="form-group mb-8">
                    <label class="form-label">Address</label>
                    <textarea id="address" class="form-control" rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Update Profile</button>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        if (!ApiService.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        async function loadProfile() {
            try {
                const profile = await ApiService.get('/auth/profile/');
                document.getElementById('username').value = profile.username;
                document.getElementById('email').value = profile.email || '';
                document.getElementById('phone').value = profile.phone || '';
                document.getElementById('address').value = profile.address || '';
            } catch (error) {
                UI.showError('Failed to load profile');
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Updating...';
            btn.disabled = true;

            const data = {
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            try {
                await ApiService.put('/auth/profile/', data);
                UI.showToast('Profile updated successfully!');
            } catch (error) {
                UI.showError(error.message || 'Failed to update profile');
            } finally {
                btn.innerText = 'Update Profile';
                btn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
