<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Shop | Shopping Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">CodeAlpha Shop</a>
            <button class="mobile-menu-btn">☰</button>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <main class="container">
        <h2 class="mb-8">Shopping Cart</h2>
        
        <div class="grid grid-cols-3" style="gap: 2rem;">
            <div class="col-span-2" id="cart-items" style="grid-column: span 2;">
                <!-- Cart items will be loaded here -->
            </div>
            
            <div class="card" style="padding: 1.5rem; height: fit-content;">
                <h3 class="mb-4">Order Summary</h3>
                <div class="flex justify-between mb-2">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">$0.00</span>
                </div>
                <div class="flex justify-between mb-4">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="flex justify-between mb-8" style="font-weight: 700; font-size: 1.25rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                    <span>Total</span>
                    <span id="summary-total">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn btn-primary" style="width: 100%;">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        if (!ApiService.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        async function loadCart() {
            UI.showLoading('cart-items');
            try {
                const data = await ApiService.get('/cart/');
                const container = document.getElementById('cart-items');
                
                if (data.items.length === 0) {
                    container.innerHTML = `
                        <div class="card text-center" style="padding: 3rem;">
                            <h3>Your cart is empty</h3>
                            <p class="text-muted mt-4">Looks like you haven't added anything yet.</p>
                            <a href="index.html" class="btn btn-primary mt-4">Start Shopping</a>
                        </div>
                    `;
                    document.getElementById('checkout-btn').disabled = true;
                    document.getElementById('summary-subtotal').innerText = '$0.00';
                    document.getElementById('summary-total').innerText = '$0.00';
                    return;
                }

                document.getElementById('checkout-btn').disabled = false;
                document.getElementById('summary-subtotal').innerText = `$${parseFloat(data.total).toFixed(2)}`;
                document.getElementById('summary-total').innerText = `$${parseFloat(data.total).toFixed(2)}`;

                container.innerHTML = data.items.map(item => `
                    <div class="card mb-4 flex items-center justify-between" style="padding: 1rem;">
                        <div class="flex items-center" style="gap: 1.5rem;">
                            <img src="${item.product_details.image ? item.product_details.image : 'https://via.placeholder.com/100'}" style="width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-md);">
                            <div>
                                <h4 class="mb-1">${item.product_details.name}</h4>
                                <div class="text-muted">$${item.product_details.price}</div>
                            </div>
                        </div>
                        <div class="flex items-center" style="gap: 1.5rem;">
                            <div class="flex items-center" style="gap: 0.5rem;">
                                <button class="btn btn-outline" style="padding: 0.25rem 0.5rem;" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                <span>${item.quantity}</span>
                                <button class="btn btn-outline" style="padding: 0.25rem 0.5rem;" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            </div>
                            <div style="font-weight: 600; width: 80px; text-align: right;">
                                $${parseFloat(item.subtotal).toFixed(2)}
                            </div>
                            <button class="btn btn-danger" style="padding: 0.5rem;" onclick="removeItem(${item.id})">
                                Remove
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                UI.showError('Failed to load cart');
                document.getElementById('cart-items').innerHTML = '<div class="text-center">Failed to load cart items.</div>';
            }
        }

        async function updateQuantity(itemId, newQuantity) {
            try {
                await ApiService.put('/cart/update/', { item_id: itemId, quantity: newQuantity });
                loadCart();
            } catch (error) {
                UI.showError('Failed to update quantity');
            }
        }

        async function removeItem(itemId) {
            try {
                await ApiService.delete('/cart/remove/', { item_id: itemId });
                UI.showToast('Item removed from cart');
                loadCart();
            } catch (error) {
                UI.showError('Failed to remove item');
            }
        }

        document.getElementById('checkout-btn').addEventListener('click', async () => {
            try {
                const order = await ApiService.post('/orders/create/', {});
                UI.showToast('Order placed successfully!');
                setTimeout(() => window.location.href = `checkout.html?order_id=${order.order_id}`, 1000);
            } catch (error) {
                UI.showError(error.message || 'Failed to place order');
            }
        });

        document.addEventListener('DOMContentLoaded', loadCart);
    </script>
</body>
</html>
